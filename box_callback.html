<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Box OAuth Callback</title>
</head>
<body>
<p>認証完了 - FileMakerに戻っています...</p>
<script>
const code = new URLSearchParams(location.search).get("code");

if (code) {
  if (window.FileMaker) {
    // Webビューア内で開かれた場合
    FileMaker.PerformScript("BoxOAuthCallback", code);
  } else {
    // 外部ブラウザで開かれた場合 → fmp://でFileMakerを呼ぶ
    // ★ DB名を実際のファイル名に変えてください
    window.location.href = 
      "fmp://localhost/DB名?script=BoxOAuthCallback&param=" 
      + encodeURIComponent(code);
  }
} else {
  document.body.innerHTML = "<p>エラー: codeが取得できませんでした</p>";
}
</script>
</body>
</html>
