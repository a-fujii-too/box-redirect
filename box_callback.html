<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Box OAuth Callback</title>
</head>
<body>
<p>認証完了 - FileMaker...</p>
<script>
const code = new URLSearchParams(location.search).get("code");

if (code) {
  if (window.FileMaker) {
    FileMaker.PerformScript("BoxOAuthCallback", code);
  } else {
    window.location.href =
      "fmp://trainingfmc.account.filemaker-cloud.com/BoxAPI.fmp12?script=BoxOAuthCallback&param="
      + encodeURIComponent(code);
  }
} else {
  document.body.innerHTML = "<p>エラー: codeが取得できませんでした</p>";
}
</script>
</body>
</html>
